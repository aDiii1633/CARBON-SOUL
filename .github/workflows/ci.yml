name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint
      env:
        NEXT_TELEMETRY_DISABLED: 1
        ESLINT_USE_FLAT_CONFIG: false
      
    - name: Run Typecheck
      run: npx tsc --noEmit
      env:
        CI: true

    - name: Run Tests with Coverage
      run: npm run test -- --coverage --coverageThreshold='{"global": {"branches": 90, "functions": 90, "lines": 95, "statements": 95}}'
      env:
        CI: true

    - name: Build
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1
